<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-Day 카운터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // ========================================
    // Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', disabled = false, onClick, className = '', children, ...props }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 cursor-pointer';
      const variants = {
        primary: 'bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500 shadow-sm',
        secondary: 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 focus:ring-gray-400',
        danger: 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-400',
        ghost: 'text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:ring-gray-300',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2.5 text-sm',
        lg: 'px-6 py-3 text-base',
      };
      return (
        <button
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
          disabled={disabled}
          onClick={onClick}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Input({ type = 'text', label, value, onChange, placeholder, error, disabled = false, className = '', ...props }) {
      return (
        <div className={`flex flex-col gap-1.5 ${className}`}>
          {label && <label className="text-sm font-medium text-gray-700">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            className={`w-full px-4 py-2.5 rounded-xl border ${error ? 'border-red-400 focus:ring-red-400' : 'border-gray-300 focus:ring-blue-500'} focus:outline-none focus:ring-2 focus:ring-offset-1 transition-all duration-200 text-gray-800 placeholder-gray-400 ${disabled ? 'bg-gray-100 cursor-not-allowed' : 'bg-white'}`}
            {...props}
          />
          {error && <p className="text-xs text-red-500">{error}</p>}
        </div>
      );
    }

    function Card({ className = '', children, ...props }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`} {...props}>
          {children}
        </div>
      );
    }

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-lg' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" />
          <div
            className={`relative bg-white rounded-2xl shadow-xl w-full ${sizes[size]} fade-in`}
            onClick={(e) => e.stopPropagation()}
          >
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100">
              <h2 className="text-lg font-bold text-gray-800">{title}</h2>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors text-xl leading-none cursor-pointer" aria-label="닫기">&times;</button>
            </div>
            <div className="px-6 py-5">{children}</div>
          </div>
        </div>
      );
    }

    function Badge({ color = 'blue', children, className = '' }) {
      const colors = {
        blue: 'bg-blue-100 text-blue-700',
        green: 'bg-green-100 text-green-700',
        gray: 'bg-gray-100 text-gray-500',
        red: 'bg-red-100 text-red-600',
      };
      return (
        <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${colors[color]} ${className}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // Utility Functions
    // ========================================

    function calcDday(targetDateStr) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(targetDateStr);
      target.setHours(0, 0, 0, 0);
      const diff = Math.round((target - today) / (1000 * 60 * 60 * 24));
      return diff;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
      const w = weekdays[d.getDay()];
      return `${y}. ${m}. ${day}. (${w})`;
    }

    function getDdayLabel(diff) {
      if (diff === 0) return 'D-Day';
      if (diff > 0) return `D-${diff}`;
      return `D+${Math.abs(diff)}`;
    }

    const EMOJI_LIST = ['🎓', '✈️', '📝', '🎂', '💍', '🏠', '💼', '🎉', '🏃', '📅', '❤️', '🎄', '🌸', '⭐', '🔥', '🎯'];

    // ========================================
    // Hooks
    // ========================================

    function useLocalStorage(key, initialValue) {
      const [value, setValue] = useState(() => {
        try {
          const stored = localStorage.getItem(key);
          return stored ? JSON.parse(stored) : initialValue;
        } catch {
          return initialValue;
        }
      });

      useEffect(() => {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch { /* ignore */ }
      }, [key, value]);

      return [value, setValue];
    }

    // ========================================
    // Page Components
    // ========================================

    function AddEventForm({ onAdd, onClose }) {
      const [name, setName] = useState('');
      const [date, setDate] = useState('');
      const [emoji, setEmoji] = useState('📅');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!name.trim()) { setError('이벤트 이름을 입력해주세요.'); return; }
        if (!date) { setError('날짜를 선택해주세요.'); return; }
        onAdd({ id: Date.now(), name: name.trim(), date, emoji });
        onClose();
      };

      return (
        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
          {error && <p className="text-sm text-red-500 bg-red-50 px-3 py-2 rounded-lg">{error}</p>}
          <Input
            label="이벤트 이름"
            value={name}
            onChange={(e) => { setName(e.target.value); setError(''); }}
            placeholder="예: 졸업식, 여행, 시험"
          />
          <Input
            type="date"
            label="목표 날짜"
            value={date}
            onChange={(e) => { setDate(e.target.value); setError(''); }}
          />
          <div>
            <label className="text-sm font-medium text-gray-700 block mb-2">아이콘 선택</label>
            <div className="flex flex-wrap gap-2">
              {EMOJI_LIST.map((em) => (
                <button
                  key={em}
                  type="button"
                  onClick={() => setEmoji(em)}
                  className={`w-10 h-10 flex items-center justify-center text-xl rounded-xl cursor-pointer transition-all duration-150 ${emoji === em ? 'bg-blue-100 ring-2 ring-blue-500 scale-110' : 'bg-gray-50 hover:bg-gray-100'}`}
                >
                  {em}
                </button>
              ))}
            </div>
          </div>
          <div className="flex gap-3 pt-2">
            <Button type="button" variant="secondary" onClick={onClose} className="flex-1">취소</Button>
            <Button type="submit" variant="primary" className="flex-1">추가하기</Button>
          </div>
        </form>
      );
    }

    function DdayCard({ event, onDelete }) {
      const diff = calcDday(event.date);
      const label = getDdayLabel(diff);
      const isToday = diff === 0;
      const isPast = diff < 0;
      const isUpcoming = diff > 0;

      let borderColor = 'border-blue-200';
      let bgAccent = 'bg-blue-50';
      let labelColor = 'text-blue-600';
      let badgeColor = 'blue';

      if (isToday) {
        borderColor = 'border-green-300';
        bgAccent = 'bg-green-50';
        labelColor = 'text-green-600';
        badgeColor = 'green';
      } else if (isPast) {
        borderColor = 'border-gray-200';
        bgAccent = 'bg-gray-50';
        labelColor = 'text-gray-400';
        badgeColor = 'gray';
      }

      return (
        <Card className={`fade-in overflow-hidden border-l-4 ${borderColor} hover:shadow-md transition-shadow duration-200`}>
          <div className="p-4 sm:p-5">
            <div className="flex items-start justify-between gap-3">
              <div className="flex items-start gap-3 min-w-0">
                <div className={`w-11 h-11 flex-shrink-0 flex items-center justify-center rounded-xl ${bgAccent} text-xl`}>
                  {event.emoji}
                </div>
                <div className="min-w-0">
                  <h3 className={`font-semibold text-gray-800 truncate ${isPast ? 'text-gray-500' : ''}`}>
                    {event.name}
                  </h3>
                  <p className="text-sm text-gray-400 mt-0.5">{formatDate(event.date)}</p>
                </div>
              </div>
              <div className="flex items-start gap-2 flex-shrink-0">
                <div className="text-right">
                  <span className={`text-2xl font-extrabold tracking-tight ${labelColor}`}>{label}</span>
                  {isUpcoming && (
                    <p className="text-xs text-gray-400 mt-0.5">{diff}일 남음</p>
                  )}
                  {isPast && (
                    <p className="text-xs text-gray-400 mt-0.5">{Math.abs(diff)}일 지남</p>
                  )}
                  {isToday && (
                    <Badge color="green" className="mt-1">오늘</Badge>
                  )}
                </div>
                <button
                  onClick={() => onDelete(event.id)}
                  className="text-gray-300 hover:text-red-500 transition-colors ml-1 cursor-pointer p-1"
                  aria-label="삭제"
                  title="삭제"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd" />
                  </svg>
                </button>
              </div>
            </div>
            {isUpcoming && diff <= 365 && (
              <div className="mt-3">
                <div className="w-full bg-gray-100 rounded-full h-1.5">
                  <div
                    className="bg-blue-500 h-1.5 rounded-full transition-all duration-500"
                    style={{ width: `${Math.max(2, Math.min(100, 100 - (diff / 365) * 100))}%` }}
                  />
                </div>
              </div>
            )}
          </div>
        </Card>
      );
    }

    function EmptyState() {
      return (
        <div className="flex flex-col items-center justify-center py-16 text-center">
          <div className="text-5xl mb-4">📅</div>
          <h3 className="text-lg font-semibold text-gray-500 mb-1">등록된 D-Day가 없습니다</h3>
          <p className="text-sm text-gray-400">아래 버튼을 눌러 새 이벤트를 추가해보세요.</p>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function App() {
      const [events, setEvents] = useLocalStorage('dday-events', []);
      const [modalOpen, setModalOpen] = useState(false);

      const handleAdd = useCallback((event) => {
        setEvents((prev) => [...prev, event]);
      }, []);

      const handleDelete = useCallback((id) => {
        setEvents((prev) => prev.filter((e) => e.id !== id));
      }, []);

      const sortedEvents = useMemo(() => {
        return [...events].sort((a, b) => {
          const da = calcDday(a.date);
          const db = calcDday(b.date);
          // upcoming (positive) first sorted ascending, then past (negative) sorted descending
          if (da >= 0 && db >= 0) return da - db;
          if (da < 0 && db < 0) return db - da;
          if (da >= 0) return -1;
          return 1;
        });
      }, [events]);

      const upcomingCount = useMemo(() => events.filter((e) => calcDday(e.date) >= 0).length, [events]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
          {/* Header */}
          <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-100">
            <div className="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
              <div>
                <h1 className="text-xl font-bold text-gray-900">D-Day 카운터</h1>
                {events.length > 0 && (
                  <p className="text-xs text-gray-400 mt-0.5">
                    다가오는 이벤트 {upcomingCount}개 / 전체 {events.length}개
                  </p>
                )}
              </div>
              <Button variant="primary" size="md" onClick={() => setModalOpen(true)}>
                + 새 이벤트
              </Button>
            </div>
          </header>

          {/* Content */}
          <main className="max-w-2xl mx-auto px-4 py-6">
            {sortedEvents.length === 0 ? (
              <EmptyState />
            ) : (
              <div className="flex flex-col gap-3">
                {sortedEvents.map((event) => (
                  <DdayCard key={event.id} event={event} onDelete={handleDelete} />
                ))}
              </div>
            )}
          </main>

          {/* FAB for mobile */}
          <button
            onClick={() => setModalOpen(true)}
            className="fixed bottom-6 right-6 sm:hidden w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg hover:bg-blue-700 flex items-center justify-center text-2xl cursor-pointer transition-transform hover:scale-105 active:scale-95 z-30"
            aria-label="새 이벤트 추가"
          >
            +
          </button>

          {/* Modal */}
          <Modal isOpen={modalOpen} onClose={() => setModalOpen(false)} title="새 D-Day 추가">
            <AddEventForm onAdd={handleAdd} onClose={() => setModalOpen(false)} />
          </Modal>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
